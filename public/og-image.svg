<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Grid representing prefectures -->
  <g transform="translate(60,120)">
    <rect x="0" y="0" width="140" height="90" rx="8" fill="#3b82f6" opacity="0.8"/>
    <rect x="150" y="0" width="140" height="90" rx="8" fill="#2563eb" opacity="0.8"/>
    <rect x="300" y="0" width="140" height="90" rx="8" fill="#1d4ed8" opacity="0.8"/>
    <rect x="0" y="100" width="90" height="120" rx="8" fill="#60a5fa" opacity="0.8"/>
    <rect x="100" y="100" width="90" height="120" rx="8" fill="#3b82f6" opacity="0.8"/>
    <rect x="200" y="100" width="90" height="120" rx="8" fill="#93c5fd" opacity="0.8"/>
    <rect x="300" y="100" width="140" height="120" rx="8" fill="#3b82f6" opacity="0.8"/>
    <rect x="0" y="230" width="90" height="90" rx="8" fill="#2563eb" opacity="0.8"/>
    <rect x="100" y="230" width="90" height="90" rx="8" fill="#60a5fa" opacity="0.8"/>
    <rect x="200" y="230" width="90" height="90" rx="8" fill="#93c5fd" opacity="0.8"/>
    <rect x="300" y="230" width="140" height="90" rx="8" fill="#bfdbfe" opacity="0.6"/>
    <rect x="0" y="330" width="90" height="90" rx="8" fill="#93c5fd" opacity="0.8"/>
    <rect x="100" y="330" width="160" height="90" rx="8" fill="#3b82f6" opacity="0.8"/>
    <rect x="270" y="330" width="170" height="90" rx="8" fill="#60a5fa" opacity="0.8"/>
  </g>
  <text x="580" y="100" font-size="56" font-weight="bold" fill="white" font-family="sans-serif">ヒカマー</text>
  <text x="580" y="170" font-size="56" font-weight="bold" fill="#60a5fa" font-family="sans-serif">都道府県分布</text>
  <text x="580" y="250" font-size="28" fill="#94a3b8" font-family="sans-serif">ツイートから都道府県を可視化</text>
  <text x="580" y="300" font-size="28" fill="#94a3b8" font-family="sans-serif">D3.js インタラクティブマップ</text>
